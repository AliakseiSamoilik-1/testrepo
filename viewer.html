<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зритель</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 0.4rem; }
  .sub { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

  .connect-card { background: #1a1a1a; border: 0.5px solid #333; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; }
  .connect-card label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.5rem; }
  .id-input { width: 100%; font-family: monospace; font-size: 1.4rem; font-weight: 600; letter-spacing: 0.1em; color: #fff; background: #111; border: 0.5px solid #444; border-radius: 8px; padding: 0.65rem 1rem; outline: none; text-transform: uppercase; }
  .id-input:focus { border-color: #777; }
  .connect-btn { width: 100%; margin-top: 1rem; padding: 0.85rem; background: #fff; color: #000; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .connect-btn:hover { opacity: 0.88; }
  .connect-btn:disabled { opacity: 0.3; cursor: default; }
  .hint { margin-top: 0.75rem; font-size: 0.82rem; color: #555; text-align: center; }

  video { width: 100%; max-width: 680px; aspect-ratio: 16/9; background: #1a1a1a; border-radius: 12px; object-fit: cover; display: none; }

  .status-bar { display: none; width: 100%; max-width: 680px; margin-top: 1rem; }
  .status-inner { display: flex; align-items: center; gap: 0.5rem; background: #1a1a1a; border: 0.5px solid #333; border-radius: 8px; padding: 0.6rem 1rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
  .dot.live { background: #f87171; }
  .dot.error { background: #f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 0.85rem; color: #aaa; }
  .disconnect-btn { margin-left: auto; background: transparent; border: 0.5px solid #444; color: #888; border-radius: 6px; padding: 0.3rem 0.7rem; font-size: 0.8rem; cursor: pointer; }
  .disconnect-btn:hover { border-color: #666; color: #ccc; }

  .live-badge { display: none; position: relative; }
  .live-badge span { background: #ef4444; color: #fff; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; padding: 0.2rem 0.55rem; border-radius: 4px; }
</style>
</head>
<body>

<h1>📺 Зритель</h1>
<p class="sub">Подключение к трансляции по ID</p>

<div class="connect-card" id="connectCard">
  <label>ID стримера</label>
  <input class="id-input" id="idInput" type="text" placeholder="XXXX-XXXX" maxlength="36" autocomplete="off" spellcheck="false" />
  <button class="connect-btn" id="connectBtn">Подключиться</button>
  <p class="hint">Введите ID из окна стримера</p>
</div>

<video id="remoteVideo" autoplay playsinline controls></video>

<div class="status-bar" id="statusBar">
  <div class="status-inner">
    <div class="dot connecting" id="dot"></div>
    <span class="status-text" id="statusText">Подключение...</span>
    <button class="disconnect-btn" id="disconnectBtn" onclick="disconnect()">Отключиться</button>
  </div>
</div>

<script>
let peer, currentCall;

document.getElementById('idInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});

document.getElementById('connectBtn').addEventListener('click', connect);

function connect() {
  const id = document.getElementById('idInput').value.trim();
  if (!id) return;

  const btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.textContent = 'Подключение...';

  peer = new Peer({ debug: 0 });

  peer.on('open', myId => {
    setStatus('connecting', 'Вызов стримера...');
    document.getElementById('connectCard').style.display = 'none';
    document.getElementById('statusBar').style.display = 'block';

    currentCall = peer.call(id, getFakeStream());

    currentCall.on('stream', remoteStream => {
      const video = document.getElementById('remoteVideo');
      video.srcObject = remoteStream;
      video.style.display = 'block';
      setStatus('live', 'В эфире');
    });

    currentCall.on('close', () => {
      setStatus('error', 'Трансляция завершена');
      document.getElementById('remoteVideo').style.display = 'none';
    });

    currentCall.on('error', e => {
      setStatus('error', 'Ошибка соединения');
    });
  });

  peer.on('error', e => {
    setStatus('error', e.type === 'peer-unavailable'
      ? 'Стример не найден — проверьте ID'
      : 'Ошибка: ' + e.type);
    btn.disabled = false;
    btn.textContent = 'Подключиться';
    document.getElementById('connectCard').style.display = 'block';
    document.getElementById('statusBar').style.display = 'none';
  });
}

function disconnect() {
  if (currentCall) currentCall.close();
  if (peer) peer.destroy();
  document.getElementById('remoteVideo').style.display = 'none';
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('statusBar').style.display = 'none';
  document.getElementById('connectCard').style.display = 'block';
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('connectBtn').textContent = 'Подключиться';
}

function getFakeStream() {
  const canvas = document.createElement('canvas');
  canvas.width = 1; canvas.height = 1;
  return canvas.captureStream(1);
}

function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + state;
  document.getElementById('statusText').textContent = text;
}
</script>
</body>
</html>
