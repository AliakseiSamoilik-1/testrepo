<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tank Controller v1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #16213e;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #top-bar.collapsed {
      flex-wrap: nowrap;
      padding: 6px 16px;
    }

    #top-bar.collapsed .bar-group.collapsible {
      display: none;
    }

    #btn-toggle-config {
      font-size: 16px;
      padding: 2px 8px;
      line-height: 1;
      flex-shrink: 0;
    }

    #status {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      background: #444;
      white-space: nowrap;
    }
    #status.connected    { background: #2a7a2a; }
    #status.disconnected { background: #7a2a2a; }

    .bar-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .bar-label { font-size: 12px; white-space: nowrap; opacity: 0.8; }

    .bar-input {
      background: #0f3460;
      border: 1px solid #555;
      color: #eee;
      padding: 4px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }

    #ip-input    { width: 220px; }
    #room-input  { width: 80px; }
    #min-input, #max-input { width: 58px; }
    #hz-input    { width: 46px; }

    #speed-input { width: 80px; accent-color: #f5a623; }

    .slider-track.blocked {
      border-color: #e94560;
      box-shadow: 0 0 8px rgba(233,69,96,0.6);
    }
    .slider-track.blocked .slider-thumb {
      background: #e94560;
    }

    button {
      background: #0f3460;
      border: 1px solid #555;
      color: #eee;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
    }
    button:active { background: #1a5a9a; }

    #sliders-area {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 12px;
      gap: 12px;
      min-height: 0;
    }

    .slider-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .slider-label {
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .slider-value {
      font-size: 20px;
      font-weight: bold;
      min-width: 50px;
      text-align: center;
    }

    .slider-track {
      flex: 1;
      width: 60px;
      background: #0f3460;
      border-radius: 12px;
      border: 2px solid #2a4a8a;
      position: relative;
      cursor: pointer;
      touch-action: none;
    }

    .slider-fill {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      border-radius: 10px;
      background: linear-gradient(to top, #e94560, #f5a623);
    }

    .slider-thumb {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 28px;
      background: #eee;
      border-radius: 8px;
      border: 2px solid #aaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .slider-neutral-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.25);
      top: 50%;
      pointer-events: none;
    }

    #joy-pad {
      flex: 1;
      width: 120px;
      min-height: 0;
      background: #0f3460;
      border-radius: 12px;
      border: 2px solid #2a4a8a;
      position: relative;
      cursor: pointer;
      touch-action: none;
    }

    #joy-thumb {
      position: absolute;
      width: 52px;
      height: 52px;
      background: #eee;
      border-radius: 50%;
      border: 2px solid #aaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transform: translate(-50%, -50%);
      pointer-events: none;
      left: 50%;
      top: 50%;
    }

    .joy-line {
      position: absolute;
      background: rgba(255,255,255,0.2);
      pointer-events: none;
    }
    .joy-line-h { height: 2px; left: 0; right: 0; top: 50%; transform: translateY(-50%); }
    .joy-line-v { width: 2px; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); }
  </style>
</head>
<body>

<div id="top-bar">
  <button id="btn-toggle-config" title="Toggle config panel">&#9881;</button>

  <!-- WS connection -->
  <div class="bar-group collapsible">
    <span class="bar-label">WS:</span>
    <input id="ip-input" class="bar-input" type="text" value="wss://<api-id>.execute-api.us-east-1.amazonaws.com/dev" placeholder="wss://…">
    <select id="ws-select" class="bar-input" title="Saved addresses">
      <option value="" disabled selected>Saved…</option>
    </select>
    <button id="btn-save" title="Save current address">Save</button>
    <button id="btn-del"  title="Delete selected address">Del</button>
  </div>

  <!-- Room -->
  <div class="bar-group collapsible">
    <span class="bar-label">Room:</span>
    <input id="room-input" class="bar-input" type="text" value="tank1" placeholder="room id">
  </div>

  <div class="bar-group collapsible">
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect">Disconnect</button>
  </div>

  <!-- Range -->
  <div class="bar-group collapsible">
    <span class="bar-label">Min:</span>
    <input id="min-input" class="bar-input" type="number" value="1400">
    <span class="bar-label">Max:</span>
    <input id="max-input" class="bar-input" type="number" value="1600">
  </div>

  <!-- Return speed -->
  <div class="bar-group collapsible">
    <span class="bar-label">Return:</span>
    <input id="speed-input" type="range" min="0" max="5000" step="50" value="800">
    <span id="speed-val" class="bar-label">800</span>
  </div>

  <!-- Dead zone -->
  <div class="bar-group collapsible">
    <span class="bar-label">Dead zone:</span>
    <input id="dz-input" type="range" min="0" max="200" step="1" value="0">
    <span id="dz-val" class="bar-label">0</span>
  </div>

  <!-- Cross block duration -->
  <div class="bar-group collapsible">
    <span class="bar-label">Cross block:</span>
    <input id="block-input" class="bar-input" type="number" value="500" min="0" max="10000" style="width:64px">
    <span class="bar-label">ms</span>
  </div>

  <!-- Send rate + status (always visible) -->
  <div class="bar-group">
    <span class="bar-label collapsible">Hz:</span>
    <input id="hz-input" class="bar-input collapsible" type="number" value="5" min="1" max="100">
    <div id="status" class="disconnected">Disconnected</div>
  </div>
</div>

<div id="sliders-area">
  <div class="slider-wrap">
    <div class="slider-label">LEFT (X)</div>
    <div class="slider-value" id="val-x">1500</div>
    <div class="slider-track" id="track-x">
      <div class="slider-neutral-line"></div>
      <div class="slider-fill"  id="fill-x"></div>
      <div class="slider-thumb" id="thumb-x"></div>
    </div>
  </div>

  <div class="slider-wrap">
    <div class="slider-label">CENTER</div>
    <div id="joy-pad">
      <div class="joy-line joy-line-h"></div>
      <div class="joy-line joy-line-v"></div>
      <div id="joy-thumb"></div>
    </div>
  </div>

  <div class="slider-wrap">
    <div class="slider-label">RIGHT (Y)</div>
    <div class="slider-value" id="val-y">1500</div>
    <div class="slider-track" id="track-y">
      <div class="slider-neutral-line"></div>
      <div class="slider-fill"  id="fill-y"></div>
      <div class="slider-thumb" id="thumb-y"></div>
    </div>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const minInput   = document.getElementById('min-input');
  const maxInput   = document.getElementById('max-input');
  const speedInput = document.getElementById('speed-input');
  const speedVal   = document.getElementById('speed-val');
  const dzInput    = document.getElementById('dz-input');
  const dzVal      = document.getElementById('dz-val');
  const hzInput    = document.getElementById('hz-input');
  const blockInput = document.getElementById('block-input');

  dzInput.addEventListener('input', () => { dzVal.textContent = dzInput.value; });

  function cfg() {
    const lo = Number(minInput.value);
    const hi = Number(maxInput.value);
    return {
      min:      Math.min(lo, hi),
      max:      Math.max(lo, hi),
      get neutral() { return (this.min + this.max) / 2; },
      speed:    Number(speedInput.value),
      deadZone: Number(dzInput.value),
    };
  }

  function applyDeadZone(val) {
    const c = cfg();
    return Math.abs(val - c.neutral) <= c.deadZone ? c.neutral : val;
  }

  speedInput.addEventListener('input', () => {
    speedVal.textContent = speedInput.value;
    const c = cfg();
    valX = Math.max(c.min, Math.min(c.max, valX));
    valY = Math.max(c.min, Math.min(c.max, valY));
  });

  function onRangeChange() {
    const c = cfg();
    valX = Math.max(c.min, Math.min(c.max, valX));
    valY = Math.max(c.min, Math.min(c.max, valY));
  }
  minInput.addEventListener('change', onRangeChange);
  maxInput.addEventListener('change', onRangeChange);

  // ── State ──────────────────────────────────────────────────────────────────
  let valX = cfg().neutral, valY = cfg().neutral;
  let lastSentX = -1, lastSentY = -1, lastSentTime = 0;
  let ws = null;
  let sendInterval = null;

  let xBlockedUntil = 0, yBlockedUntil = 0;
  let prevSideX = 0, prevSideY = 0;

  function getSide(val, neutral) {
    if (val > neutral) return 1;
    if (val < neutral) return -1;
    return 0;
  }

  // ── Joystick state ─────────────────────────────────────────────────────────
  let joyTouchId = null, joyMouseActive = false;
  let joyX_norm = 0, joyY_norm = 0;

  function joyNormFromEvent(clientX, clientY) {
    const rect = joyPad.getBoundingClientRect();
    joyX_norm = Math.max(-1, Math.min(1, (clientX - rect.left) / rect.width  * 2 - 1));
    joyY_norm = Math.max(-1, Math.min(1, -((clientY - rect.top)  / rect.height * 2 - 1)));
  }

  function applyJoy() {
    const c = cfg(), half = (c.max - c.min) / 2;
    setX(Math.round(Math.max(c.min, Math.min(c.max, c.neutral + (joyY_norm + joyX_norm) * half))));
    setY(Math.round(Math.max(c.min, Math.min(c.max, c.neutral + (joyY_norm - joyX_norm) * half))));
  }

  function updateJoyThumb() {
    const padW = joyPad.clientWidth, padH = joyPad.clientHeight;
    joyThumb.style.left = ((joyX_norm  * 0.5 + 0.5) * padW) + 'px';
    joyThumb.style.top  = ((-joyY_norm * 0.5 + 0.5) * padH) + 'px';
  }

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const trackX   = document.getElementById('track-x');
  const trackY   = document.getElementById('track-y');
  const fillX    = document.getElementById('fill-x');
  const fillY    = document.getElementById('fill-y');
  const thumbX   = document.getElementById('thumb-x');
  const thumbY   = document.getElementById('thumb-y');
  const valXEl   = document.getElementById('val-x');
  const valYEl   = document.getElementById('val-y');
  const statusEl = document.getElementById('status');
  const ipInput  = document.getElementById('ip-input');
  const roomInput= document.getElementById('room-input');
  const joyPad   = document.getElementById('joy-pad');
  const joyThumb = document.getElementById('joy-thumb');

  // ── Slider rendering ───────────────────────────────────────────────────────
  function renderSlider(val, fill, thumb, track) {
    const c = cfg();
    const fraction = (val - c.min) / (c.max - c.min);
    const h = track.clientHeight;
    const thumbH = thumb.offsetHeight;
    const fillH = fraction * h;
    const thumbTop = h - fillH - thumbH / 2;
    fill.style.height = fillH + 'px';
    thumb.style.top   = Math.max(0, Math.min(h - thumbH, thumbTop)) + 'px';
  }

  function renderAll() {
    const now = Date.now();
    renderSlider(valX, fillX, thumbX, trackX);
    renderSlider(valY, fillY, thumbY, trackY);
    valXEl.textContent = Math.round(valX);
    valYEl.textContent = Math.round(valY);
    trackX.classList.toggle('blocked', now < xBlockedUntil);
    trackY.classList.toggle('blocked', now < yBlockedUntil);
  }

  // ── Touch / Mouse slider logic ─────────────────────────────────────────────
  function yToValue(clientY, track) {
    const c = cfg();
    const rect = track.getBoundingClientRect();
    const fraction = 1 - (clientY - rect.top) / rect.height;
    const clamped  = Math.max(0, Math.min(1, fraction));
    return Math.round(c.min + clamped * (c.max - c.min));
  }

  let touchIdX = null, touchIdY = null;

  function handleTouchStart(e) {
    let handled = false;
    for (const t of e.changedTouches) {
      if (trackX.contains(e.target) || e.target === trackX) {
        if (touchIdX === null) { touchIdX = t.identifier; setX(yToValue(t.clientY, trackX)); handled = true; }
      }
      if (trackY.contains(e.target) || e.target === trackY) {
        if (touchIdY === null) { touchIdY = t.identifier; setY(yToValue(t.clientY, trackY)); handled = true; }
      }
    }
    if (handled) e.preventDefault();
  }

  function handleTouchMove(e) {
    let handled = false;
    for (const t of e.changedTouches) {
      if (t.identifier === touchIdX) { setX(yToValue(t.clientY, trackX)); handled = true; }
      if (t.identifier === touchIdY) { setY(yToValue(t.clientY, trackY)); handled = true; }
    }
    if (handled) e.preventDefault();
  }

  function handleTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === touchIdX) touchIdX = null;
      if (t.identifier === touchIdY) touchIdY = null;
    }
  }

  let mouseTarget = null;
  function handleMouseDown(e, track, setter) {
    mouseTarget = { track, setter };
    setter(yToValue(e.clientY, track));
    e.preventDefault();
  }
  globalThis.addEventListener('mousemove', e => {
    if (!mouseTarget) return;
    mouseTarget.setter(yToValue(e.clientY, mouseTarget.track));
  });
  globalThis.addEventListener('mouseup', () => { mouseTarget = null; joyMouseActive = false; });

  trackX.addEventListener('mousedown', e => handleMouseDown(e, trackX, setX));
  trackY.addEventListener('mousedown', e => handleMouseDown(e, trackY, setY));

  document.addEventListener('touchstart', handleTouchStart, { passive: false });
  document.addEventListener('touchmove',  handleTouchMove,  { passive: false });
  document.addEventListener('touchend',   handleTouchEnd,   { passive: false });
  document.addEventListener('touchcancel',handleTouchEnd,   { passive: false });

  function setX(v) {
    const side = getSide(v, cfg().neutral);
    if (side !== 0 && prevSideX !== 0 && side !== prevSideX) {
      xBlockedUntil = Date.now() + Number(blockInput.value);
    }
    if (side !== 0) prevSideX = side;
    valX = v;
  }

  function setY(v) {
    const side = getSide(v, cfg().neutral);
    if (side !== 0 && prevSideY !== 0 && side !== prevSideY) {
      yBlockedUntil = Date.now() + Number(blockInput.value);
    }
    if (side !== 0) prevSideY = side;
    valY = v;
  }

  // ── Return-to-neutral animation (rAF loop) ────────────────────────────────
  let lastReturnTime = null;

  function returnLoop(timestamp) {
    if (lastReturnTime === null) lastReturnTime = timestamp;
    const dt = Math.min((timestamp - lastReturnTime) / 1000, 0.1);
    lastReturnTime = timestamp;

    const c = cfg();
    const joyActive = joyTouchId !== null || joyMouseActive;

    if (joyActive) {
      applyJoy();
    } else {
      const normStep = c.speed === 0 ? 2 : c.speed * dt / ((c.max - c.min) / 2);
      joyX_norm = snapTo(joyX_norm, 0, normStep);
      joyY_norm = snapTo(joyY_norm, 0, normStep);

      const mouseOnX = mouseTarget !== null && mouseTarget.track === trackX;
      const mouseOnY = mouseTarget !== null && mouseTarget.track === trackY;
      if (touchIdX === null && !mouseOnX) valX = snapTo(valX, c.neutral, c.speed * dt);
      if (touchIdY === null && !mouseOnY) valY = snapTo(valY, c.neutral, c.speed * dt);
    }

    updateJoyThumb();
    renderAll();
    requestAnimationFrame(returnLoop);
  }

  function snapTo(val, target, step) {
    if (step === 0 || Math.abs(val - target) <= step) return target;
    return val > target ? val - step : val + step;
  }

  requestAnimationFrame(returnLoop);

  // ── Center joystick events ────────────────────────────────────────────────
  joyPad.addEventListener('mousedown', e => {
    joyMouseActive = true;
    joyNormFromEvent(e.clientX, e.clientY);
    applyJoy();
    e.preventDefault();
  });

  globalThis.addEventListener('mousemove', e => {
    if (!joyMouseActive) return;
    joyNormFromEvent(e.clientX, e.clientY);
    applyJoy();
  });

  joyPad.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      if (joyTouchId === null) {
        joyTouchId = t.identifier;
        joyNormFromEvent(t.clientX, t.clientY);
        applyJoy();
      }
    }
    e.preventDefault();
  }, { passive: false });

  joyPad.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        joyNormFromEvent(t.clientX, t.clientY);
        applyJoy();
      }
    }
    e.preventDefault();
  }, { passive: false });

  joyPad.addEventListener('touchend',   e => { for (const t of e.changedTouches) if (t.identifier === joyTouchId) joyTouchId = null; });
  joyPad.addEventListener('touchcancel',e => { for (const t of e.changedTouches) if (t.identifier === joyTouchId) joyTouchId = null; });

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls;
  }

  function buildUrl() {
    let base = ipInput.value.trim();
    if (!base.startsWith('ws')) base = 'wss://' + base;
    const room = roomInput.value.trim() || 'default';
    return `${base}?role=controller&room=${encodeURIComponent(room)}`;
  }

  function connect() {
    if (ws) { ws.close(); ws = null; }
    setStatus('Connecting…', '');
    ws = new WebSocket(buildUrl());
    ws.binaryType = 'arraybuffer';
    ws.onopen  = () => { console.log('[WS] Connected:', buildUrl()); setStatus('Connected', 'connected'); startSendLoop(); };
    ws.onclose = e  => { console.warn('[WS] Closed — code:', e.code, '| reason:', e.reason || '(none)', '| clean:', e.wasClean); setStatus('Disconnected', 'disconnected'); stopSendLoop(); };
    ws.onerror = e  => { console.error('[WS] Error:', e); setStatus('Error', 'disconnected'); };
    ws.onmessage = e => console.log('[WS] Message:', e.data);
  }

  function sendData() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const c = cfg();
    const neutral = Math.round(c.neutral);
    const now = Date.now();
    const rx = (now < xBlockedUntil) ? neutral : Math.round(applyDeadZone(valX));
    const ry = (now < yBlockedUntil) ? neutral : Math.round(applyDeadZone(valY));
    if (rx === lastSentX && ry === lastSentY && now - lastSentTime < 1000) return;
    const buf  = new ArrayBuffer(4);
    const view = new DataView(buf);
    view.setUint16(0, rx, true);
    view.setUint16(2, ry, true);
    ws.send(buf);
    lastSentX = rx; lastSentY = ry; lastSentTime = now;
  }

  function startSendLoop() {
    stopSendLoop();
    const hz = Math.max(1, Math.min(100, Number.parseInt(hzInput.value) || 20));
    sendInterval = setInterval(sendData, 1000 / hz);
  }

  function stopSendLoop() {
    if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
  }

  document.getElementById('btn-connect').addEventListener('click', connect);
  document.getElementById('btn-disconnect').addEventListener('click', () => {
    if (ws) { ws.close(); ws = null; }
  });

  // ── Saved WS addresses ─────────────────────────────────────────────────────
  const wsSelect  = document.getElementById('ws-select');
  const STORE_KEY = 'tank_ws_addresses_v1';

  function loadAddresses() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch { return []; }
  }

  function saveAddresses(list) {
    localStorage.setItem(STORE_KEY, JSON.stringify(list));
  }

  function refreshSelect() {
    wsSelect.innerHTML = '<option value="" disabled>Saved…</option>';
    for (const addr of loadAddresses()) {
      const opt = document.createElement('option');
      opt.value = opt.textContent = addr;
      wsSelect.appendChild(opt);
    }
    wsSelect.value = '';
  }

  wsSelect.addEventListener('change', () => {
    if (wsSelect.value) ipInput.value = wsSelect.value;
  });

  document.getElementById('btn-save').addEventListener('click', () => {
    const addr = ipInput.value.trim();
    if (!addr) return;
    const list = loadAddresses().filter(a => a !== addr);
    list.unshift(addr);
    saveAddresses(list.slice(0, 20));
    refreshSelect();
  });

  document.getElementById('btn-del').addEventListener('click', () => {
    const addr = wsSelect.value || ipInput.value.trim();
    if (!addr) return;
    saveAddresses(loadAddresses().filter(a => a !== addr));
    refreshSelect();
  });

  refreshSelect();

  // ── Config panel toggle ────────────────────────────────────────────────────
  const topBar     = document.getElementById('top-bar');
  const btnToggle  = document.getElementById('btn-toggle-config');
  const CONFIG_KEY = 'tank_config_visible_v1';

  function applyConfigVisibility(visible) {
    topBar.classList.toggle('collapsed', !visible);
    btnToggle.textContent = visible ? '✕' : '⚙';
    localStorage.setItem(CONFIG_KEY, visible ? '1' : '0');
  }

  btnToggle.addEventListener('click', () => {
    applyConfigVisibility(topBar.classList.contains('collapsed'));
  });

  applyConfigVisibility(localStorage.getItem(CONFIG_KEY) !== '0');

  globalThis.addEventListener('resize', renderAll);
</script>
</body>
</html>
