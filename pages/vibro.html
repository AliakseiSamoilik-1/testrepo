<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibro Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100svh;
      background: #111;
      color: #eee;
      gap: 20px;
      padding: 24px 16px;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.05em; }
    .version { font-size: 0.75rem; color: #555; margin-top: -14px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 340px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #888;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #333;
      color: #eee;
      border-color: #666;
    }

    /* Cards */
    .card {
      background: #222;
      border-radius: 16px;
      padding: 20px 24px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 340px; }

    label { font-size: 0.85rem; color: #aaa; }
    .row { display: flex; flex-direction: column; gap: 6px; }
    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #333;
      color: #eee;
      font-size: 1rem;
    }
    .status {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      min-height: 1.2em;
    }
    .status.active { color: #4caf50; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #toggleBtn { background: #4caf50; color: #fff; }
    #toggleBtn.running { background: #e53935; }
    #testBtn { background: #1565c0; color: #fff; }
    #trainerBtn { background: #4caf50; color: #fff; }
    #trainerBtn.running { background: #e53935; }

    /* Trainer display */
    .trainer-display {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .phase-name { font-size: 1rem; color: #aaa; }
    .phase-timer { font-size: 2.8rem; font-weight: 700; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
    .phase-timer.p1 { color: #42a5f5; }
    .phase-timer.p2 { color: #ab47bc; }
    .cycle-num { font-size: 0.8rem; color: #555; }

    /* Progress bar */
    .progress-wrap {
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.5s linear, background 0.4s;
      background: #42a5f5;
    }
    .progress-fill.p2 { background: #ab47bc; }

    /* Trainer config rows */
    .phase-row { display: flex; gap: 10px; }
    .phase-row .row { flex: 1; }
    .phase-label { font-size: 0.8rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <h1>Vibro Timer</h1>
  <div class="version">v1.8</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="custom">Custom</button>
    <button class="tab-btn" data-tab="trainer">Trainer</button>
  </div>

  <!-- Custom tab -->
  <div id="tab-custom" class="tab-pane active card">
    <div class="row">
      <label for="duration">Vibration duration (ms)</label>
      <input type="number" id="duration" value="500" min="50" max="5000" step="50" />
    </div>
    <div class="row">
      <label for="interval">Interval between vibrations (ms)</label>
      <input type="number" id="interval" value="2000" min="200" max="30000" step="100" />
    </div>
    <button id="testBtn">Test vibration</button>
    <button id="toggleBtn">Start</button>
    <div class="status" id="status">Stopped</div>
  </div>

  <!-- Trainer tab -->
  <div id="tab-trainer" class="tab-pane card">
    <div class="phase-label">Phase 1</div>
    <div class="phase-row">
      <div class="row">
        <label for="p1mins">Duration (min)</label>
        <input type="number" id="p1mins" value="3" min="1" max="60" step="1" />
      </div>
      <div class="row">
        <label for="p1bpm">Tempo (bpm)</label>
        <input type="number" id="p1bpm" value="75" min="30" max="220" step="1" />
      </div>
    </div>
    <div class="phase-label">Phase 2</div>
    <div class="phase-row">
      <div class="row">
        <label for="p2mins">Duration (min)</label>
        <input type="number" id="p2mins" value="2" min="1" max="60" step="1" />
      </div>
      <div class="row">
        <label for="p2bpm">Tempo (bpm)</label>
        <input type="number" id="p2bpm" value="66" min="30" max="220" step="1" />
      </div>
    </div>
    <div class="trainer-display">
      <div class="phase-name" id="phaseName">—</div>
      <div class="phase-timer" id="phaseTimer">—:——</div>
      <div class="cycle-num" id="cycleNum">—</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <button id="trainerBtn">Start</button>
    <div class="status" id="trainerStatus">Stopped</div>
  </div>

  <script>
    // ── Tab switching ────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ── Wake Lock ────────────────────────────────────────────────
    let wakeLock = null;
    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }

    // ── Custom timer ─────────────────────────────────────────────
    const toggleBtn  = document.getElementById('toggleBtn');
    const testBtn    = document.getElementById('testBtn');
    const statusEl   = document.getElementById('status');
    const durationInput = document.getElementById('duration');
    const intervalInput = document.getElementById('interval');
    let running = false;

    if (!('vibrate' in navigator)) statusEl.textContent = 'Vibration not supported';

    function buildCustomPattern() {
      const duration = Math.max(50, parseInt(durationInput.value, 10) || 500);
      const interval = Math.max(duration + 50, parseInt(intervalInput.value, 10) || 2000);
      return Array(1000).fill([duration, interval - duration]).flat();
    }

    async function startCustom() {
      running = true;
      await acquireWakeLock();
      navigator.vibrate(buildCustomPattern());
      toggleBtn.textContent = 'Stop';
      toggleBtn.classList.add('running');
      statusEl.textContent = 'Running…';
      statusEl.classList.add('active');
    }

    function stopCustom() {
      running = false;
      releaseWakeLock();
      navigator.vibrate(0);
      toggleBtn.textContent = 'Start';
      toggleBtn.classList.remove('running');
      statusEl.textContent = 'Stopped';
      statusEl.classList.remove('active');
    }

    toggleBtn.addEventListener('click', () => running ? stopCustom() : startCustom());
    testBtn.addEventListener('click', () => navigator.vibrate(Math.max(50, parseInt(durationInput.value, 10) || 500)));
    [durationInput, intervalInput].forEach(el => {
      el.addEventListener('change', () => { if (running) { stopCustom(); startCustom(); } });
    });

    // ── Trainer ──────────────────────────────────────────────────
    const VIB_MS = 150;

    const trainerBtn    = document.getElementById('trainerBtn');
    const trainerStatus = document.getElementById('trainerStatus');
    const phaseNameEl   = document.getElementById('phaseName');
    const phaseTimerEl  = document.getElementById('phaseTimer');
    const cycleNumEl    = document.getElementById('cycleNum');
    const progressFill  = document.getElementById('progressFill');
    const p1minsInput   = document.getElementById('p1mins');
    const p1bpmInput    = document.getElementById('p1bpm');
    const p2minsInput   = document.getElementById('p2mins');
    const p2bpmInput    = document.getElementById('p2bpm');
    const trainerInputs = [p1minsInput, p1bpmInput, p2minsInput, p2bpmInput];

    let trainerRunning = false;
    let trainerStart   = null;
    let displayTimer   = null;
    let beatTimeout    = null;
    // Active session params (set on start, fixed for the session)
    let tPhase1, tPhase2, tCycle, beat1, beat2;

    function readTrainerParams() {
      tPhase1 = Math.max(1, parseInt(p1minsInput.value, 10) || 3) * 60000;
      tPhase2 = Math.max(1, parseInt(p2minsInput.value, 10) || 2) * 60000;
      tCycle  = tPhase1 + tPhase2;
      beat1   = Math.round(60000 / (Math.max(30, parseInt(p1bpmInput.value, 10) || 75)));
      beat2   = Math.round(60000 / (Math.max(30, parseInt(p2bpmInput.value, 10) || 66)));
    }

    function stoppedStatusText() {
      const m1 = parseInt(p1minsInput.value, 10) || 3;
      const b1 = parseInt(p1bpmInput.value, 10)  || 75;
      const m2 = parseInt(p2minsInput.value, 10) || 2;
      const b2 = parseInt(p2bpmInput.value, 10)  || 66;
      return `Stopped · ${m1} min @${b1}/min → ${m2} min @${b2}/min`;
    }

    // Beat scheduler — avoids browser pattern-length limits
    function scheduleNextBeat() {
      if (!trainerRunning) return;
      const posInCycle = (Date.now() - trainerStart) % tCycle;
      let beat, timeInBeat;
      if (posInCycle < tPhase1) {
        beat = beat1; timeInBeat = posInCycle % beat1;
      } else {
        beat = beat2; timeInBeat = (posInCycle - tPhase1) % beat2;
      }
      beatTimeout = setTimeout(() => {
        if (!trainerRunning) return;
        navigator.vibrate(VIB_MS);
        scheduleNextBeat();
      }, beat - timeInBeat);
    }

    function updateTrainerDisplay() {
      if (!trainerStart) return;
      const elapsed    = Date.now() - trainerStart;
      const posInCycle = elapsed % tCycle;
      const cycle      = Math.floor(elapsed / tCycle) + 1;

      let phase, remaining, total;
      if (posInCycle < tPhase1) {
        phase = 1; remaining = tPhase1 - posInCycle; total = tPhase1;
      } else {
        phase = 2; remaining = tCycle - posInCycle; total = tPhase2;
      }

      const bpm = phase === 1 ? parseInt(p1bpmInput.value, 10) || 75 : parseInt(p2bpmInput.value, 10) || 66;
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);

      phaseNameEl.textContent  = `Phase ${phase} · ${bpm}/min`;
      phaseTimerEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      phaseTimerEl.className   = `phase-timer p${phase}`;
      cycleNumEl.textContent   = `Cycle ${cycle}`;
      progressFill.style.width = `${((total - remaining) / total * 100).toFixed(1)}%`;
      progressFill.className   = `progress-fill p${phase}`;
    }

    function startDisplayTimer() {
      clearInterval(displayTimer);
      updateTrainerDisplay();
      displayTimer = setInterval(updateTrainerDisplay, 500);
    }

    async function startTrainer() {
      readTrainerParams();
      trainerRunning = true;
      trainerStart   = Date.now();
      trainerInputs.forEach(el => el.disabled = true);
      await acquireWakeLock();
      navigator.vibrate(VIB_MS);
      scheduleNextBeat();
      startDisplayTimer();
      trainerBtn.textContent = 'Stop';
      trainerBtn.classList.add('running');
      trainerStatus.textContent = 'Running…';
      trainerStatus.classList.add('active');
    }

    function resumeTrainer() {
      clearTimeout(beatTimeout);
      acquireWakeLock();
      navigator.vibrate(VIB_MS);
      scheduleNextBeat();
      startDisplayTimer();
    }

    function stopTrainer() {
      trainerRunning = false;
      trainerStart   = null;
      clearTimeout(beatTimeout);
      clearInterval(displayTimer);
      trainerInputs.forEach(el => el.disabled = false);
      releaseWakeLock();
      navigator.vibrate(0);
      trainerBtn.textContent = 'Start';
      trainerBtn.classList.remove('running');
      trainerStatus.textContent = stoppedStatusText();
      trainerStatus.classList.remove('active');
      phaseNameEl.textContent  = '—';
      phaseTimerEl.textContent = '—:——';
      phaseTimerEl.className   = 'phase-timer';
      cycleNumEl.textContent   = '—';
      progressFill.style.width = '0%';
    }

    trainerInputs.forEach(el => el.addEventListener('change', () => {
      trainerStatus.textContent = stoppedStatusText();
    }));

    trainerStatus.textContent = stoppedStatusText();

    trainerBtn.addEventListener('click', () => trainerRunning ? stopTrainer() : startTrainer());

    // ── Visibility recovery (both modes) ────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;
      if (running)        { acquireWakeLock(); navigator.vibrate(buildCustomPattern()); }
      if (trainerRunning) { resumeTrainer(); }
    });
  </script>
</body>
</html>
